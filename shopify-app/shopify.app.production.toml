# Production app config (Render). Dev uses shopify.app.toml.
# Deliberately omits the template's demo_info metafield and example
# metaobject definitions so they never land on merchant stores.

client_id = "4d89e9f395a278d509a5528c42d7a740"
name = "ReviewOS"
application_url = "https://reviewos-6p4p.onrender.com"
embedded = true

[access_scopes]
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_orders"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # orders/paid, orders/fulfilled, orders/cancelled subscriptions are
  # TEMPORARILY OMITTED: this app has not yet been granted protected
  # customer data access, and Shopify rejects version creation with
  # these topics until it is (verified 2026-07-16). The webhook routes
  # exist and are tested; re-add these three subscriptions and redeploy
  # once access is approved via the Partner Dashboard. Until then,
  # verified-buyer badges and review-request emails are inactive in prod.

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[app_proxy]
url = "https://reviewos-6p4p.onrender.com/proxy"
prefix = "apps"
subpath = "reviewos"

[auth]
redirect_urls = [
  "https://reviewos-6p4p.onrender.com/auth/callback",
  "https://reviewos-6p4p.onrender.com/auth/session-token"
]

[build]
# Never let a dev session rewrite production URLs.
automatically_update_urls_on_dev = false
