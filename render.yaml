services:
  - type: web
    name: reviewos
    runtime: docker
    repo: https://github.com/Rishet11/reviewos
    rootDir: shopify-app
    dockerfilePath: ./Dockerfile
    plan: free # upgrade to starter before App Store submission (free tier cold-starts)
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: write_products,write_metaobjects,write_metaobject_definitions,read_orders
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: CRON_SECRET
        sync: false
      - key: REVIEW_VERIFICATION_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
